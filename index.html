<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentinel Universal (Paparountas v C4)</title>
    
    <script>
        window.addEventListener('error', function(event) {
            const eb = document.getElementById('error-box');
            if(eb) {
                eb.style.display = 'block';
                const p = document.createElement('p');
                p.innerHTML = '<strong>CRASH LOG:</strong> ';
                p.appendChild(document.createTextNode(event.message + ' at line ' + event.lineno));
                eb.appendChild(p);
            }
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #050608; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="error-box" style="display: none; background: #450a0a; color: #fca5a5; padding: 20px; font-family: monospace; z-index: 9999; position: absolute; top: 0; left: 0; width: 100%; max-height: 200px; overflow-y: auto;"></div>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBRX11u0_Kjyqes9TNAnEq-2hk5afhOYng",
            authDomain: "sentinel-universal-hq-9ead0.firebaseapp.com",
            projectId: "sentinel-universal-hq-9ead0",
            storageBucket: "sentinel-universal-hq-9ead0.firebasestorage.app",
            messagingSenderId: "976798538117",
            appId: "1:976798538117:web:6305111cde8ee7a88a0cec",
            measurementId: "G-QT30H0R5PZ"
        };
        
        const APP_ID = "sentinel-universal-hq";
        const ADMIN_UID = "ioiHjoYyXYW0BRZnjeDypiETwEf1"; 

        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useRef, useMemo } = React;
        const L = window.lucideReact || window.lucide || window.Lucide || {};
        const getIcon = (name, fb) => L[name] || ((p) => <span style={{fontSize: p.size || 16}}>{fb}</span>);

        const Shield = getIcon('Shield', '🛡️'), Send = getIcon('Send', '📨'), User = getIcon('User', '👤'), 
              MessageSquare = getIcon('MessageSquare', '💬'), Gavel = getIcon('Gavel', '⚖️'), Save = getIcon('Save', '💾'), 
              Globe = getIcon('Globe', '🌐'), Loader2 = getIcon('Loader2', '⏳'), CheckCircle = getIcon('CheckCircle', '✅'), 
              Key = getIcon('Key', '🔑'), UploadCloud = getIcon('UploadCloud', '☁️'), FileText = getIcon('FileText', '📄'),
              AlertTriangle = getIcon('AlertTriangle', '⚠️'), Target = getIcon('Target', '🎯'), Settings = getIcon('Settings', '⚙️');

        const getSS = (k) => { try { return localStorage.getItem(k) || ''; } catch(e) { return ''; } };
        const setSS = (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} };
        const sanitize = (s) => s ? s.replace(/</g, "&lt;").replace(/>/g, "&gt;") : "";

        const App = () => {
            const [user, setUser] = useState(null);
            const [authErr, setAuthErr] = useState('');
            const [msgs, setMsgs] = useState([]);
            const [vault, setVault] = useState([]);
            const [kb, setKb] = useState([]);
            const [tab, setTab] = useState('intelligence');
            const [isProc, setIsProc] = useState(false);
            const [isUp, setIsUp] = useState(false);
            const [isAdv, setIsAdv] = useState(false);
            const [input, setInput] = useState('');
            const [isMob] = useState(window.innerWidth < 1024);
            const [aLoad, setALoad] = useState(true);
            const [cloudPrompts, setCloudPrompts] = useState(null);
            
            const [apiKey, setApiKey] = useState(getSS('gemini_api_key'));
            const [kInput, setKInput] = useState('');
            const [selectedModel, setSelectedModel] = useState(getSS('gemini_model') || 'gemini-1.5-pro');
            const scrollRef = useRef(null);
            const fRef = useRef(null);

            const isAdmin = user && user.uid === ADMIN_UID;

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    if (u) { setUser(u); setAuthErr(''); } 
                    else { setUser(null); }
                    setALoad(false);
                });
                return () => unsub();
            }, []);

            const handleLogin = async () => {
                try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } 
                catch (e) { setAuthErr("Access Restricted. Verification Failed."); }
            };

            useEffect(() => {
                if (!user) return;
                
                // Fixed: 6-segment path for prompts
                const promptDocPath = `artifacts/${APP_ID}/public/data/config/prompts`;
                const unsubPrompts = db.doc(promptDocPath).onSnapshot(doc => {
                    if (doc.exists) setCloudPrompts(doc.data());
                }, err => {
                    if (err.code === 'permission-denied') {
                        auth.signOut();
                        setAuthErr("Security Block: Access revoked.");
                    }
                });

                const unsubChat = db.collection(`artifacts/${APP_ID}/users/${user.uid}/conversations`).onSnapshot(s => {
                    setMsgs(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.ts - b.ts));
                });
                
                const unsubKb = db.collection(`artifacts/${APP_ID}/public/data/knowledgebase`).onSnapshot(s => {
                    setKb(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubV = db.collection(`artifacts/${APP_ID}/public/data/legal_vault`).onSnapshot(s => {
                    setVault(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.ts - a.ts));
                });
                
                return () => { unsubPrompts(); unsubChat(); unsubV(); unsubKb(); };
            }, [user]);

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs]);

            const handleFileUpload = async (e) => {
                const files = e.target.files; if (!files.length || !isAdmin) return;
                setIsUp(true);
                const kbPath = `artifacts/${APP_ID}/public/data/knowledgebase`;
                for (let i = 0; i < files.length; i++) {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        await db.collection(kbPath).add({
                            filename: sanitize(files[i].name),
                            content: sanitize(ev.target.result),
                            uploadedAt: Date.now()
                        });
                    };
                    reader.readAsText(files[i]);
                }
                setIsUp(false);
                if (fRef.current) fRef.current.value = '';
            };

            const handleQuery = async () => {
                if (!input.trim() || !user || !cloudPrompts) return;
                if (!apiKey) { alert("API key required."); return; }
                const safe = sanitize(input); setInput(''); setIsProc(true);
                const cRef = db.collection(`artifacts/${APP_ID}/users/${user.uid}/conversations`);
                await cRef.add({ text: safe, role: 'user', ts: Date.now(), isAdv });

                try {
                    const kbCtx = kb.map(k => `[FILE: ${k.filename}]\n${k.content}\n`).join("\n---\n");
                    const prompt = (isAdmin && isAdv ? cloudPrompts?.defense : cloudPrompts?.solicitor) || "Act as a helpful legal assistant.";
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: safe }] }], systemInstruction: { parts: [{ text: prompt + `\n\nCONTEXT:\n${kbCtx}` }] } })
                    });
                    const d = await res.json();
                    
                    let ai = "Strategy Core Offline.";
                    if (d.error) {
                        ai = `API Error (${d.error.code}): ${d.error.message}`;
                    } else if (d.candidates?.[0]?.finishReason === 'SAFETY') {
                        ai = `Security Block: Google Safety Filters triggered. Try rewording.`;
                    } else if (d.candidates?.[0]?.content?.parts?.[0]?.text) {
                        ai = d.candidates[0].content.parts[0].text;
                    } else {
                        ai = `Unexpected Response: ${JSON.stringify(d).substring(0, 100)}...`;
                    }
                    
                    await cRef.add({ text: ai, role: 'assistant', ts: Date.now(), isAdv });
                } catch (e) { 
                    await cRef.add({ text: `Connection Error: ${sanitize(e.message)}`, role: 'assistant', ts: Date.now(), isAdv: false }); 
                }
                setIsProc(false);
            };

            const nums = kb.map(k => { const m = k.filename.match(/PART\s*(\d+)/i); return m ? parseInt(m[1], 10) : null; }).filter(n => n !== null);
            const mParts = []; const maxP = nums.length ? Math.max(...nums) : 0;
            for (let i = 1; i <= maxP; i++) if (!nums.includes(i)) mParts.push(i);

            if (aLoad) return <div className="h-screen bg-[#050608] flex items-center justify-center"><Loader2 className="animate-spin text-indigo-500" size={32} /></div>;
            if (!user) return (
                <div className="flex h-screen bg-[#050608] text-slate-200 items-center justify-center p-6">
                    <div className="max-w-md w-full bg-[#0d1017] border border-slate-800 p-8 rounded-3xl text-center space-y-6 shadow-2xl">
                        <Shield size={64} className="text-indigo-500 mx-auto" />
                        <h1 className="text-2xl font-black italic uppercase tracking-tighter font-sans">Sentinel Universal</h1>
                        {authErr && <div className="p-3 bg-red-900/20 border border-red-500/30 rounded-xl text-red-400 text-xs font-bold flex gap-2"><AlertTriangle size={14} className="shrink-0" />{authErr}</div>}
                        <button onClick={handleLogin} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold flex items-center justify-center gap-3"><User size={20} /> Authenticate via Google</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-[#050608] text-slate-200 font-sans overflow-hidden flex-col lg:flex-row">
                    <aside className={`${isMob ? 'hidden' : 'flex'} w-80 bg-[#0d1017] border-r border-slate-800 flex-col shadow-2xl z-40`}>
                        <div className="p-6 border-b border-slate-800 bg-gradient-to-br from-indigo-900/10 to-transparent">
                            <div className="flex items-center gap-3 mb-2"><Shield size={24} className="text-indigo-500" /><h1 className="font-black text-xl italic tracking-tighter uppercase font-sans">Sentinel <span className="text-indigo-400 font-light not-italic">v22.4</span></h1></div>
                            <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2 font-sans"><Globe size={10} className="text-green-500" /> Secure Node Active</p>
                        </div>
                        <div className="flex-1 p-4 space-y-4 overflow-y-auto custom-scrollbar">
                            {isAdmin && (
                                <div className="space-y-4">
                                    {/* Model Selector */}
                                    <div className="bg-black/40 border border-slate-800 p-4 rounded-2xl space-y-2">
                                        <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase"><span>Intelligence Engine</span><Settings size={12}/></div>
                                        <select 
                                            value={selectedModel} 
                                            onChange={(e) => { setSelectedModel(e.target.value); setSS('gemini_model', e.target.value); }}
                                            className="w-full bg-[#141824] border border-slate-800 rounded-lg px-2 py-2 text-[11px] focus:outline-none text-indigo-400 font-bold"
                                        >
                                            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast)</option>
                                            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Deep - 2M Window)</option>
                                            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Experimental)</option>
                                        </select>
                                    </div>

                                    <div className="bg-slate-800/20 rounded-2xl border border-slate-800 p-4 space-y-3">
                                        <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase"><span>Vault Sync</span>{isUp && <Loader2 size={12} className="animate-spin" />}</div>
                                        <div className={`p-2 rounded-lg text-[9px] font-mono border ${mParts.length ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-green-500/10 text-green-400 border-green-500/20'}`}>
                                            {mParts.length ? `⚠️ Missing: ${mParts.join(', ')}` : `✅ Sequence 1-${maxP} OK`}
                                        </div>
                                        <button onClick={() => fRef.current.click()} className="w-full py-3 bg-indigo-600/10 text-indigo-400 rounded-xl flex justify-center items-center gap-2 text-xs font-bold border border-indigo-500/20 hover:bg-indigo-600/20 transition-all"><UploadCloud size={16}/> Upload Evidence</button>
                                        <input type="file" multiple ref={fRef} onChange={handleFileUpload} className="hidden" />
                                    </div>
                                    <button onClick={() => setIsAdv(!isAdv)} className={`w-full p-4 rounded-2xl border flex items-center justify-between transition-all ${isAdv ? 'bg-amber-500/10 border-amber-500/40 text-amber-500' : 'bg-slate-800/40 border-slate-700 text-slate-400'}`}><div className="flex items-center gap-3 text-xs font-black uppercase"><Gavel size={16}/> 10s Defense Audit</div><div className={`w-8 h-4 rounded-full relative ${isAdv ? 'bg-amber-500' : 'bg-slate-600'}`}><div className={`absolute top-1 w-2 h-2 rounded-full bg-white transition-all ${isAdv ? 'left-5' : 'left-1'}`} /></div></button>
                                </div>
                            )}
                            {!isAdmin && (
                                <div className="p-5 bg-[#0d1017] border border-indigo-500/30 rounded-2xl space-y-3 relative overflow-hidden"><div className="absolute top-0 left-0 w-1 h-full bg-indigo-500" /><div className="flex items-center gap-2 text-indigo-400 uppercase font-black text-xs"><Gavel size={18} /><span>Co-Counsel</span></div><p className="text-[10px] text-slate-400 font-medium leading-relaxed">Intelligence Core Active. Select strategy:</p>
                                    <button onClick={() => setInput("Dismantle C4 'Performance' defense with 360 Feedback stats.")} className="w-full text-left p-3 bg-slate-800/40 rounded-xl text-[10px] font-bold text-slate-300 border border-slate-700/50 hover:border-indigo-500/50 transition-all font-sans">🎯 Attack Performance Defense</button>
                                    <button onClick={() => setInput("Draft cross-examination for Grace Boswood re: July 21 ICO obstruction.")} className="w-full text-left p-3 bg-slate-800/40 rounded-xl text-[10px] font-bold text-slate-300 border border-slate-700/50 hover:border-indigo-500/50 transition-all font-sans">⚠️ Cross-Examine: Grace Boswood</button>
                                </div>
                            )}
                            <div className="bg-black/20 rounded-2xl border border-slate-800 p-4 space-y-3 mt-4"><div className="text-[10px] font-black text-slate-500 uppercase font-sans">Gemini Key</div>{!apiKey ? (<div className="space-y-2"><input type="password" value={kInput} onChange={e => setKInput(e.target.value)} placeholder="API Key..." className="w-full bg-[#141824] border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none" /><button onClick={() => { if(kInput.trim()){ setSS('gemini_api_key', kInput.trim()); setApiKey(kInput.trim()); } }} className="w-full py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold font-sans">Save Key</button></div>) : (<div className="flex justify-between items-center text-[10px]"><span className="text-green-500 font-mono flex items-center gap-1 font-sans"><CheckCircle size={10}/> Active</span><button onClick={() => { localStorage.removeItem('gemini_api_key'); setApiKey(''); }} className="text-red-400 uppercase hover:underline font-bold font-sans">Clear</button></div>)}</div>
                            <div className="pt-4 border-t border-slate-800 flex justify-between text-[10px] font-black text-slate-500 uppercase font-sans tracking-tight"><span>Account</span><span className="text-green-500 font-mono truncate max-w-[120px]">{user.email || user.uid.slice(0,8)}</span></div>
                        </div>
                    </aside>
                    <main className="flex-1 flex flex-col relative bg-[#07080b]">
                        <header className="h-16 border-b border-slate-800 bg-[#0d0f14]/90 backdrop-blur-md flex items-center px-6 justify-between z-30 font-sans tracking-tight"><h2 className="text-[11px] font-black tracking-widest uppercase text-slate-500 font-sans">{tab === 'intelligence' ? 'Intelligence Hub' : 'Legal Vault'}</h2><div className="flex gap-2"><button onClick={() => setTab('intelligence')} className={`p-2 rounded-lg ${tab === 'intelligence' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}><MessageSquare size={18}/></button><button onClick={() => setTab('vault')} className={`p-2 rounded-lg ${tab === 'vault' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}><Save size={18}/></button></div></header>
                        <div className="flex-1 overflow-hidden relative">
                            {tab === 'intelligence' ? (
                                <div className="h-full flex flex-col max-w-5xl mx-auto w-full px-4 lg:px-6 py-4">
                                    {!apiKey ? (<div className="flex-1 flex flex-col items-center justify-center opacity-40 space-y-4"><Key size={64} className="text-amber-500" /><p className="text-sm font-sans">API Key Required.</p></div>) : (
                                        <><div ref={scrollRef} className="flex-1 overflow-y-auto space-y-6 mb-20 lg:mb-4 custom-scrollbar scroll-smooth">
                                                {msgs.length === 0 && (<div className="h-full flex flex-col items-center justify-center opacity-20"><Shield size={64} className="text-indigo-500" /><p className="text-xs mt-4 font-sans tracking-tight">Node Secured. Using {selectedModel}.</p></div>)}
                                                {msgs.map((m, i) => (<div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in`}><div className={`max-w-[95%] lg:max-w-[85%] p-5 rounded-3xl border ${m.role === 'user' ? 'bg-indigo-600 border-indigo-500 rounded-tr-none text-white' : m.isAdv ? 'bg-amber-950/20 border-amber-900/40 text-amber-100 rounded-tl-none' : 'bg-[#141824] border-slate-800 rounded-tl-none text-slate-200'}`}><div className="flex justify-between items-center mb-2 opacity-50 text-[10px] font-black uppercase tracking-widest font-sans tracking-tight"><div className="flex items-center gap-2">{m.isAdv ? <Gavel size={12}/> : <Shield size={12}/>}{!isAdmin && m.role === 'assistant' ? 'Co-Counsel' : m.role}</div>{m.role === 'assistant' && isAdmin && <button onClick={() => { db.collection(`artifacts/${APP_ID}/public/data/legal_vault`).add({ content: m.text, ts: Date.now(), publisher: user.uid }); alert("Published."); }} className="text-indigo-400 hover:text-white font-sans">Publish</button>}</div><p className="text-[14px] leading-relaxed whitespace-pre-wrap font-medium font-sans">{m.text}</p></div></div>))}
                                                {isProc && (<div className="flex justify-start"><div className="bg-[#141824] border border-slate-800 p-4 rounded-3xl rounded-tl-none flex items-center gap-3"><Loader2 size={16} className="animate-spin text-indigo-500" /><span className="text-[10px] text-slate-500 font-black uppercase tracking-widest font-sans tracking-tight">Processing through {selectedModel}...</span></div></div>)}
                                            </div>
                                            <div className="fixed bottom-6 lg:bottom-4 left-4 right-4 lg:relative lg:left-0 lg:right-0 bg-[#11141d] p-1.5 rounded-2xl border border-slate-800 flex items-center z-40 shadow-2xl">
                                                {isAdmin && (<button onClick={() => setIsAdv(!isAdv)} className={`p-3 rounded-xl transition-all mr-1 lg:hidden ${isAdv ? 'bg-amber-500 text-black' : 'text-slate-500'}`}><Gavel size={20} /></button>)}
                                                <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleQuery()} placeholder={isAdmin && isAdv ? "Audit Statement..." : "Ask Co-Counsel..."} className="flex-1 bg-transparent outline-none px-2 py-3 text-sm font-sans" />
                                                <button onClick={handleQuery} className="p-3 bg-indigo-600 text-white rounded-xl active:scale-95"><Send size={20}/></button>
                                            </div></>)}
                                </div>
                            ) : (
                                <div className="p-6 h-full overflow-y-auto custom-scrollbar"><h2 className="text-xl font-black italic uppercase text-slate-400 mb-6 font-sans tracking-tight">Verified Vault</h2><div className="grid grid-cols-1 md:grid-cols-2 gap-4">{vault.map((ev, i) => (<div key={i} className="p-5 bg-[#11141d] border border-slate-800 rounded-2xl relative overflow-hidden"><div className="absolute top-0 left-0 w-1 h-full bg-indigo-500" /><div className="flex justify-between mb-2"><span className="text-[10px] font-mono text-slate-600 font-sans tracking-tight">Ref: {ev.id.slice(0,8)}</span><span className="text-[9px] text-green-500 font-bold uppercase font-sans tracking-tight">Verified</span></div><p className="text-sm italic text-slate-300 whitespace-pre-wrap font-sans">{ev.content}</p></div>))}</div></div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
